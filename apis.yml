apis:
  - aid: flightaware:aeroapi
    name: FlightAware AeroAPI
    description: >-
      AeroAPI is FlightAware's query-based REST API for accessing aviation
      data on demand. It exposes 60+ endpoints across flights, airports,
      operators, alerts, history, and Foresight predictive analytics, and
      supports both real-time and historical flight tracking, status,
      positions, routes, and notifications.
    humanURL: https://www.flightaware.com/aeroapi/portal/
    baseURL: https://aeroapi.flightaware.com/aeroapi
    tags:
      - Airports
      - Alerts
      - Aviation
      - Flights
      - Flight Tracking
      - Foresight
      - History
      - Operators
      - Predictive Analytics
    properties:
      - type: Documentation
        url: https://www.flightaware.com/aeroapi/portal/documentation
      - type: Portal
        url: https://www.flightaware.com/aeroapi/portal/
      - type: Pricing
        url: https://www.flightaware.com/commercial/aeroapi/
  - aid: flightaware:firehose
    name: FlightAware Firehose
    description: >-
      Firehose is FlightAware's real-time streaming feed of global flight
      data, delivering ADS-B, radar, and ATC-derived position, status,
      and event messages over a persistent TLS connection for
      enterprise-grade flight tracking, situational awareness, and
      operations analytics.
    humanURL: https://www.flightaware.com/commercial/firehose/
    tags:
      - ADS-B
      - Aviation
      - Flight Tracking
      - Real-Time
      - Streaming
    properties:
      - type: Documentation
        url: https://www.flightaware.com/commercial/firehose/documentation
      - type: ProductPage
        url: https://www.flightaware.com/commercial/firehose/
