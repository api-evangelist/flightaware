aid: flightaware
name: FlightAware
description: >-
  FlightAware is a global flight tracking and data platform that provides
  real-time flight tracking, mapping, and predictive technology to both
  individual users and commercial aviation companies. The platform
  collects data from a variety of sources including air traffic control
  systems, radar, ADS-B, and satellite data, and exposes that data to
  developers and commercial customers through its AeroAPI query-based
  REST API and its Firehose streaming feed.
